# Templates for the secrets the deployment needs. Fill in values and apply,
# or create them with kubectl (see README.md). Never commit filled-in copies.
apiVersion: v1
kind: Secret
metadata:
  name: c2c-postgres-secret
  namespace: vtlib
type: Opaque
stringData:
  password: "CHANGE-ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: c2c-env
  namespace: vtlib
type: Opaque
stringData:
  DATABASE_URL: "postgres://c2c:CHANGE-ME@c2c-postgres.vtlib.svc.cluster.local:5432/c2c"
  SESSION_SECRET: "" # openssl rand -base64 32
  CAS_SERVICE_URL: "https://vtlibai-cc.endeavour.cs.vt.edu/api/user/casvalidate"
  CAS_LOGIN_URL: "https://login.vt.edu/profile/cas/login"
  CAS_SERVICE_VALIDATE_URL: "https://login.vt.edu/profile/cas/serviceValidate"
  ADMIN_ACCOUNTS: "gback,afbailey"
  CC_BEARER_TOKEN: ""
  CC_BEARER_URL: "https://vtlibai-cc.endeavour.cs.vt.edu"
  CC_INTERNAL_URL: "http://c2c.vtlib.svc.cluster.local:3000"
  K8S_NAMESPACE: "vtlib"
  SANDBOX_CONTAINER_IMAGE: "container.cs.vt.edu/gback/registry/opencode-sandbox:latest"
  LLM_API_BASE_URL: "https://llm-api.arc.vt.edu/api/v1"
  LLM_API_KEY: ""
---
# The kubeconfig the C2C uses to create agent Jobs (endeavour.yaml).
# Create with:
#   kubectl -n vtlib create secret generic c2c-kubeconfig --from-file=config=endeavour.yaml
apiVersion: v1
kind: Secret
metadata:
  name: c2c-kubeconfig
  namespace: vtlib
type: Opaque
stringData:
  config: |
    # contents of endeavour.yaml
