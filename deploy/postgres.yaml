apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: vtlib
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2c-postgres
  namespace: vtlib
  labels:
    app: c2c-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate # single writer on a RWO volume
  selector:
    matchLabels:
      app: c2c-postgres
  template:
    metadata:
      labels:
        app: c2c-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - name: POSTGRES_USER
              value: c2c
            - name: POSTGRES_DB
              value: c2c
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: c2c-postgres-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "c2c"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: c2c-postgres
  namespace: vtlib
spec:
  selector:
    app: c2c-postgres
  ports:
    - port: 5432
      targetPort: 5432
